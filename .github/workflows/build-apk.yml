name: Build Android APK

on:
  push:
    branches: [main, feat/mainWindow]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git zip unzip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip3 install buildozer

      - name: 🔨 Build APK
        run: |
          cd /home/runner/work/He-Shui-La/He-Shui-La
          buildozer android debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heshuila-debug-apk
          path: /home/runner/work/He-Shui-La/He-Shui-La/bin/*.apk
          retention-days: 30
