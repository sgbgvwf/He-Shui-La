name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt update -qq
          sudo apt remove -y -qq r-base-dev pkgconf 2>/dev/null || true
          sudo apt install -y -qq python3-pip openjdk-17-jdk zip unzip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev libltdl-dev

      - name: Install p4a
        run: |
          pip3 install cython
          pip3 install python-for-android

      - name: Patch android recipe (add Cython build dep)
        run: |
          RECIPE_DIR=$(python3 -c "import pythonforandroid.recipes.android; import os; print(os.path.dirname(os.path.abspath(pythonforandroid.recipes.android.__file__)))")
          echo "Recipe dir: $RECIPE_DIR"
          ls -la "$RECIPE_DIR/"
          ls -la "$RECIPE_DIR/src/" 2>/dev/null || echo "no src dir"
          # Try src dir first, fall back to recipe dir
          for d in "$RECIPE_DIR/src" "$RECIPE_DIR"; do
            if [ -f "$d/setup.py" ] || [ -f "$d/setup.cfg" ]; then
              cat > "$d/pyproject.toml" << 'PYEOF'
[build-system]
requires = ["setuptools", "cython"]
build-backend = "setuptools.build_meta"
PYEOF
              echo "Patched $d/pyproject.toml"
              break
            fi
          done

      - name: p4a create (build recipes)
        env:
          PIP_NO_BUILD_ISOLATION: "1"
        run: |
          p4a create --requirements=python3,kivy,numpy,pygltflib,cython \
            --arch=arm64-v8a --dist-name=heshuila \
            --bootstrap=sdl2 --permission=INTERNET --permission=VIBRATE \
            --orientation=portrait --copy-libs --android-api=34
        timeout-minutes: 45

      - name: p4a apk (package)
        run: |
          p4a apk --dist-name=heshuila \
            --private=$GITHUB_WORKSPACE \
            --package=org.heshuila.heshuila \
            --name="DrinkWater" --version=0.1.0 \
            --android-api=34
        timeout-minutes: 15

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heshuila-debug-apk
          path: ./*.apk
          retention-days: 30
