name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt update -qq
          sudo apt remove -y -qq r-base-dev pkgconf 2>/dev/null || true
          sudo apt install -y -qq python3-pip openjdk-17-jdk git zip unzip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev libltdl-dev

      - name: Install Buildozer
        run: |
          pip3 install cython
          pip3 install buildozer

      - name: Clean old build cache
        run: rm -rf /home/runner/.buildozer /home/runner/work/He-Shui-La/He-Shui-La/.buildozer

      - name: Build APK
        run: buildozer android debug --verbose 2>&1
        timeout-minutes: 45

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: heshuila-debug-apk
          path: bin/*.apk
          retention-days: 30
